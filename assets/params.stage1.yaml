# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# neurobridge — Stage 1 parameter file
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# This file defines user-adjustable parameters controlling QC, genetic analyses,
# locus definition, and fine-mapping.
# All parameters can be overridden at runtime via `-params-file`.
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Workflow booleans
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
run_qc: false
run_ldsc: false
run_hdl: false
run_sumher: false
run_twosamplemr: false
run_magma: false
run_lava: false
run_conjfdr: false
run_def_loci: false
run_gwas_coloc: false
run_susie: false
run_fuma: false
run_target_genes: false
run_qtl_manifest: true
run_smr: true

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Input / output
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
input: "assets/gwas.tsv"          # GWAS samplesheet (trait-level metadata and file paths)
pairs: "assets/ldsc_pairs.tsv"    # Trait-pair definitions for cross-trait analyses
outdir: "results"                 # Output directory for all pipeline results

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# QC (GWAS harmonisation)
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
maf_min: 0.01                     # Minimum minor allele frequency threshold (SNPs below removed)
info_min: 0.90                    # Minimum imputation INFO score threshold (this QC protocol is only applied when an INFO column is present - else: ignore)

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# LDSC (pairwise)
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
ldsc_maf_filter: 0.01             # SAME MAF filter as during QC (retain the same threshold from above)
ldsc_info_filter: 0.9             # SAME INFO filter as during QC (retain the same threshold from above)
ldsc_mean_chisq_min: 1.02
ldsc_intercept_min: 0.9
ldsc_intercept_max: 1.1
ldsc_h2_z_min: 2.0

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# SumHer (LDAK-based heritability / rg)
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
power: -0.25         # LDAK heritability model parameter (recommended default)
thresh: 0.01         # SNP inclusion threshold for tagging / model fitting
do_tagging: false    # Whether to run LDAK tagging step (required for full SumHer workflow)

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# HDL (global genetic correlation)
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
hdl_eigen_cut: 0.99      # Proportion of eigenvalues retained in HDL decomposition
hdl_N0: 0                # Sample overlap parameter (0 if assuming no overlap)
hdl_lim: 1.522998e-08    # Numerical tolerance for HDL (exp(-18))
hdl_jackknife: true      # Whether to compute block jackknife SE

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# TwoSampleMR
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
mr_pval_threshold: 5e-8          # P-value threshold for selecting exposure instruments (genome-wide significance)
f_stat_thresh: 10                # Minimum F-statistic threshold to exclude weak instruments
mr_clump_r2: 0.001               # LD threshold for clumping MR instruments (very stringent for independence)
mr_clump_kb: 10000               # Window size (kb) for MR clumping (typically large to ensure independence)
clump_p1: 1                      # Primary p-value threshold for clumping (kept as 1 to rely on mr_pval_threshold)
clump_p2: 1                      # Secondary p-value threshold for clumping (not really used but required by function)
mrpresso_nb_distribution: 1000   # Number of simulations for MR-PRESSO (higher = more stable, slower)
mrpresso_signif_threshold: 0.05  # Significance threshold for MR-PRESSO global/outlier tests
phenoscanner_p: 5e-8             # P-value threshold for Phenoscanner pleiotropy filtering

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# LD clumping (PLINK) — applied to conjFDR hits
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
clump_r2: 0.6        # LD threshold for defining independent signals
clump_kb: 1000       # Window size (kb) for clumping
merge_kb: 500        # Distance (kb) to merge nearby loci
ld_r2: 0.1           # LD threshold for defining locus boundaries
ld_kb: 250           # LD window size (kb)

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Locus definition
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
window: 500000       # Genomic window around lead SNP (bp)
                     # e.g. 500000 = ±500 kb around lead variant

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# SuSiE fine-mapping
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
susie_L: 1           # Maximum number of causal components (L = 1 recommended when using external LD / low confidence LD)
max_iter: 5000       # Maximum number of optimisation iterations

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Gene mapping
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
mapping_range: 10    # Distance from start and end of candidate locus coordinates (in kb) - larger == more genes mapped but less specific

# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
# Functional bio / QTL integration
# ~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~~
qtls: assets/qtls.tsv # QTL dataset description file

# Which QTL datasets from assets/qtls.tsv to run
# Must match the `id` column in qtls.tsv
qtl_ids:
  - eqtlgen_cis
  - fujita_eqtl

# SMR / HEIDI parameters
smr_fdr_thresh: 0.05 # Significance threshold for any given gene-QTL association via SMR (FDR corrected across all genes tested)
heidi_thresh: 0.01   # Threshold to remove genes confounded by linkage 
default_qtl_freq: 0.5
peqtl_smr: 5e-8      # SMR p-val cutt-off for the top SNPs pertaining to candidate probes on a specific QTL dataset
peqtl_heidi: 1.57e-3 # Same thing but for HEIDI (heterogeneity)
thread_num: 8        # No of CPU threads used for that task (nf.config for SMR == 8 max)

# Single-cell QTL behaviour
# If true: run all cell types found in the QTL directory
# If false: only run the cell types listed below
# If != single-cell SMR + HEIDI / COLOC => Blank - on list 
all_cell_types: false
cell_type_list:
  - Oli
